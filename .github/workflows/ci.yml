name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test:unit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7
      - name: Coverage summary
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('Statements:', c.statements.pct + '%');
              console.log('Branches:  ', c.branches.pct + '%');
              console.log('Functions: ', c.functions.pct + '%');
              console.log('Lines:     ', c.lines.pct + '%');
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          PCT=$(node -e "console.log(require('./coverage/coverage-summary.json').total.statements.pct)")
          if (( $(echo "$PCT >= 90" | bc -l) )); then COLOR="brightgreen";
          elif (( $(echo "$PCT >= 80" | bc -l) )); then COLOR="green";
          elif (( $(echo "$PCT >= 70" | bc -l) )); then COLOR="yellow";
          elif (( $(echo "$PCT >= 60" | bc -l) )); then COLOR="orange";
          else COLOR="red"; fi
          mkdir -p badges
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}" > badges/coverage.json
      - name: Deploy coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          BADGE_JSON=$(cat badges/coverage.json)
          DEPLOY_DIR=$(mktemp -d)
          cd "$DEPLOY_DIR"
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/bthurlow/artificer-mcp.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Try to pull existing gh-pages
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            touch .nojekyll
            git add .nojekyll
          fi

          mkdir -p badges
          echo "$BADGE_JSON" > badges/coverage.json
          git add badges/coverage.json
          git diff --staged --quiet || {
            git commit -m "chore: update coverage badge"
            git push origin gh-pages
          }

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - name: Install ImageMagick v7
        # Ubuntu noble's apt `imagemagick` package is v6.9.x and does NOT
        # provide a `magick` CLI entry point. Our tools require v7+'s `magick`
        # command, so install the official static AppImage instead.
        #
        # Fontconfig + ghostscript are still needed as ImageMagick runtime
        # dependencies for certain operations (PDFs, type resolution).
        # Tests don't rely on host fonts — they use a bundled TTF in
        # tests/fixtures/fonts/.
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig ghostscript
          wget -q -O /tmp/magick "https://imagemagick.org/archive/binaries/magick"
          chmod +x /tmp/magick
          sudo mv /tmp/magick /usr/local/bin/magick
          magick --version | head -1
      - name: Install FFmpeg (static binary)
        # Pin via johnvansickle static build so tests run against a known recent version.
        run: |
          wget -q -O /tmp/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          mkdir -p /tmp/ffmpeg-extract
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract --strip-components=1
          sudo mv /tmp/ffmpeg-extract/ffmpeg /usr/local/bin/ffmpeg
          sudo mv /tmp/ffmpeg-extract/ffprobe /usr/local/bin/ffprobe
          ffmpeg -version | head -1
          ffprobe -version | head -1
      - run: yarn install --frozen-lockfile
      - run: yarn test:integration
