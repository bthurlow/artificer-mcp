name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          # Conventional commits: feat → minor, fix → patch, feat! → major
          # The action creates/updates a Release PR that accumulates changes.
          # Merging the Release PR cuts the actual release + tag.

  # npm publish only runs after a release is actually created
  # (i.e., after the Release PR is merged — not on every push)
  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn build
      # Uncomment when ready to publish to npm
      # - run: yarn publish --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish placeholder
        run: echo "npm publish ready — uncomment the publish step and add NPM_TOKEN secret when ready"
