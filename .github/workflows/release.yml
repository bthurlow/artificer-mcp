name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      # Node 24 ships npm 11.x which has OIDC trusted publishing support.
      # Node 22 ships npm 10.x which does NOT — and self-upgrading npm
      # globally on GH runners breaks with MODULE_NOT_FOUND errors.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - name: Verify publish environment
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "NODE_AUTH_TOKEN set: ${NODE_AUTH_TOKEN:+yes}${NODE_AUTH_TOKEN:-no}"
      # setup-node sets NODE_AUTH_TOKEN to GITHUB_TOKEN by default.
      # Must fully unset it (not empty) so npm falls through to OIDC.
      - run: unset NODE_AUTH_TOKEN && npm publish --provenance --access public
